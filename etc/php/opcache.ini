[opcache]
; OPcache remains enabled for performance, but is configured to detect
; file changes immediately and never persist cache to disk.

; Check file timestamps on every request (0 = always check).
; Default is 2 seconds which causes stale code after deployments.
opcache.revalidate_freq=0

; Always validate timestamps so modified files are picked up.
opcache.validate_timestamps=1

; Disable file-based cache so nothing survives a container restart.
opcache.file_cache=

; Reasonable memory limit for Laravel applications.
opcache.memory_consumption=128

; Enough slots for a typical Laravel app with vendor dependencies.
opcache.max_accelerated_files=10000

; Store interned strings in OPcache (saves memory with many files).
opcache.interned_strings_buffer=16
