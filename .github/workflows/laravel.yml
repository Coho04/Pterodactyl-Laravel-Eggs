name: build-laravel

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"
  push:
    branches:
      - main

jobs:
  push:
    name: "Coho04:laravel_${{ matrix.tag }}_php_${{ matrix.php_version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag:
          - 11
        php_version:
          - 82  # PHP 8.2
          - 83  # PHP 8.3
          - 84  # PHP 8.4
          - 85  # PHP 8.5

    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: ./
          file: ./${{ matrix.tag }}/php_${{ matrix.php_version }}/Dockerfile
          platforms: linux/amd64
          push: true
          cache-from: type=gha,scope=${{ matrix.tag }}-php${{ matrix.php_version }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tag }}-php${{ matrix.php_version }}
          tags: |
            ghcr.io/coho04/pterodactyl-docker-images:laravel_${{ matrix.tag }}_php_${{ matrix.php_version }}
            ghcr.io/coho04/pterodactyl-docker-images:laravel_${{ matrix.tag }}_php_${{ matrix.php_version }}_nginx
